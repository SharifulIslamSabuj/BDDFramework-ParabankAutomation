# ===== UAT Environment Configuration =====
# ParaBank BDD Framework - UAT Environment Settings

# ===== Base Application URL =====
baseUrl=https://uat.parabank.parasoft.com/parabank/

# ===== Browser Configuration =====
browserName=chrome
headless=false

# ===== Timeout Configuration (in seconds) =====
waitTime=45
implicitWait=30
pageLoadTimeout=60

# ===== Test Credentials =====
# Set TEST_USERNAME and TEST_PASSWORD environment variables or CI/CD secrets.
# Never commit real credentials to source control.
username=
password=

# ===== Reporting Configuration =====
screenshotOnFailure=true
screenshotOnPass=false

# ===== Parallel Execution Configuration =====
threadPoolSize=2

# ===== Environment Configuration =====
environment=uat

# ===== Remote Grid Configuration =====
remoteGridUrl=http://selenium-grid-uat:4444/wd/hub
seleniumGridEnabled=true
