# ===== UAT Environment Configuration =====
# ParaBank BDD Framework - UAT Environment Settings

# ===== Base Application URL =====
baseUrl=https://uat.parabank.parasoft.com/parabank/

# ===== Browser Configuration =====
browserName=chrome
headless=false

# ===== Timeout Configuration (in seconds) =====
waitTime=45
implicitWait=30
pageLoadTimeout=60

# ===== Test Credentials =====
username=uat_user
password=uat_pass123

# ===== Reporting Configuration =====
screenshotOnFailure=true
screenshotOnPass=false

# ===== Parallel Execution Configuration =====
threadPoolSize=2

# ===== Environment Configuration =====
environment=uat

# ===== Logging Configuration =====
logLevel=DEBUG

# ===== Video Recording =====
videoRecording=true

# ===== Remote Grid Configuration =====
remoteGridUrl=http://selenium-grid-uat:4444/wd/hub
seleniumGridEnabled=true

# ===== Database Configuration =====
db.url=jdbc:mysql://uat-db-server:3306/parabank_uat
db.username=uat_tester
db.password=uat_db_pass

# ===== API Configuration =====
api.baseUrl=https://uat.parabank.parasoft.com/parabank/services/bank
api.timeout=45

# ===== Security Configuration =====
encrypt.sensitive.data=true
secret.key=uat_secret_key_2024

# ===== Test Data Configuration =====
testdata.source=mixed
testdata.cache.enabled=true

# ===== Performance Configuration =====
performance.monitoring=true
slow.test.threshold=45

# ===== Notification Configuration =====
email.notifications=true
slack.notifications=true
teams.notifications=false

