# ===== QA Environment Configuration =====
# ParaBank BDD Framework - QA Environment Settings

# ===== Base Application URL =====
baseUrl=https://parabank.parasoft.com/parabank/

# ===== Browser Configuration =====
browserName=chrome
headless=false

# ===== Timeout Configuration (in seconds) =====
waitTime=30
implicitWait=20
pageLoadTimeout=45

# ===== Test Credentials =====
username=sqa
password=sqa

# ===== Reporting Configuration =====
screenshotOnFailure=true
screenshotOnPass=false

# ===== Parallel Execution Configuration =====
threadPoolSize=3

# ===== Environment Configuration =====
environment=qa

# ===== Logging Configuration =====
logLevel=INFO

# ===== Video Recording =====
videoRecording=false

# ===== Remote Grid Configuration =====
remoteGridUrl=
seleniumGridEnabled=false

# ===== Database Configuration (if needed) =====
db.url=
db.username=
db.password=

# ===== API Configuration =====
api.baseUrl=https://parabank.parasoft.com/parabank/services/bank
api.timeout=30

# ===== Security Configuration =====
encrypt.sensitive.data=false
secret.key=

# ===== Test Data Configuration =====
testdata.source=faker
testdata.cache.enabled=true

# ===== Performance Configuration =====
performance.monitoring=true
slow.test.threshold=30

# ===== Notification Configuration =====
email.notifications=false
slack.notifications=false
teams.notifications=false

