# ===== QA Environment Configuration =====
# ParaBank BDD Framework - QA Environment Settings

# ===== Base Application URL =====
baseUrl=https://parabank.parasoft.com/parabank/

# ===== Browser Configuration =====
browserName=chrome
headless=false

# ===== Timeout Configuration (in seconds) =====
waitTime=30
implicitWait=20
pageLoadTimeout=45

# ===== Test Credentials =====
# These values are used as fallback when the TEST_USERNAME / TEST_PASSWORD
# environment variables are not set.  Override via env vars in CI/CD:
#   export TEST_USERNAME=<value>
#   export TEST_PASSWORD=<value>
# ConfigManager.getUsername() / getPassword() check env vars first.
username=sqa
password=sqa

# ===== Reporting Configuration =====
screenshotOnFailure=true
screenshotOnPass=false

# ===== Parallel Execution Configuration =====
threadPoolSize=3

# ===== Environment Configuration =====
environment=qa

# ===== Remote Grid Configuration =====
remoteGridUrl=
seleniumGridEnabled=false
