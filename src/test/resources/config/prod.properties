# ===== PRODUCTION Environment Configuration =====
# ParaBank BDD Framework - PRODUCTION Environment Settings
# WARNING: Use with extreme caution - This is PRODUCTION!

# ===== Base Application URL =====
baseUrl=https://parabank.parasoft.com/parabank/

# ===== Browser Configuration =====
browserName=chrome
headless=true

# ===== Timeout Configuration (in seconds) =====
waitTime=30
implicitWait=20
pageLoadTimeout=45

# ===== Test Credentials =====
# WARNING: Use read-only test accounts only!
username=prod_test_user
password=prod_test_pass123

# ===== Reporting Configuration =====
screenshotOnFailure=true
screenshotOnPass=false

# ===== Parallel Execution Configuration =====
threadPoolSize=1

# ===== Environment Configuration =====
environment=prod

# ===== Logging Configuration =====
logLevel=ERROR

# ===== Video Recording =====
videoRecording=false

# ===== Remote Grid Configuration =====
remoteGridUrl=http://selenium-grid-prod:4444/wd/hub
seleniumGridEnabled=true

# ===== Database Configuration =====
# WARNING: Read-only access only!
db.url=jdbc:mysql://prod-db-server:3306/parabank_prod
db.username=prod_readonly_user
db.password=prod_readonly_pass

# ===== API Configuration =====
api.baseUrl=https://parabank.parasoft.com/parabank/services/bank
api.timeout=30

# ===== Security Configuration =====
encrypt.sensitive.data=true
secret.key=prod_secret_key_2024

# ===== Test Data Configuration =====
testdata.source=production_safe
testdata.cache.enabled=false

# ===== Performance Configuration =====
performance.monitoring=true
slow.test.threshold=30

# ===== Notification Configuration =====
email.notifications=true
slack.notifications=true
teams.notifications=true

# ===== Production Safety =====
production.safety.enabled=true
destructive.tests.disabled=true
data.modification.disabled=true
