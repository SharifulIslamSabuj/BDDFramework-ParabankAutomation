# ===== PRODUCTION Environment Configuration =====
# ParaBank BDD Framework - PRODUCTION Environment Settings
# WARNING: Use with extreme caution - This is PRODUCTION!

# ===== Base Application URL =====
baseUrl=https://parabank.parasoft.com/parabank/

# ===== Browser Configuration =====
browserName=chrome
headless=true

# ===== Timeout Configuration (in seconds) =====
waitTime=30
implicitWait=20
pageLoadTimeout=45

# ===== Test Credentials =====
# Set TEST_USERNAME and TEST_PASSWORD environment variables or CI/CD secrets.
# Never commit real credentials to source control.
username=
password=

# ===== Reporting Configuration =====
screenshotOnFailure=true
screenshotOnPass=false

# ===== Parallel Execution Configuration =====
threadPoolSize=1

# ===== Environment Configuration =====
environment=prod

# ===== Remote Grid Configuration =====
remoteGridUrl=http://selenium-grid-prod:4444/wd/hub
seleniumGridEnabled=true
