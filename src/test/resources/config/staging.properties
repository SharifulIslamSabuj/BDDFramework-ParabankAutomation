# ===== STAGING Environment Configuration =====
# ParaBank BDD Framework - STAGING Environment Settings

# ===== Base Application URL =====
baseUrl=https://staging.parabank.parasoft.com/parabank/

# ===== Browser Configuration =====
browserName=firefox
headless=true

# ===== Timeout Configuration (in seconds) =====
waitTime=60
implicitWait=40
pageLoadTimeout=90

# ===== Test Credentials =====
username=staging_user
password=staging_pass123

# ===== Reporting Configuration =====
screenshotOnFailure=true
screenshotOnPass=false

# ===== Parallel Execution Configuration =====
threadPoolSize=1

# ===== Environment Configuration =====
environment=staging

# ===== Logging Configuration =====
logLevel=WARN

# ===== Video Recording =====
videoRecording=true

# ===== Remote Grid Configuration =====
remoteGridUrl=http://selenium-grid-staging:4444/wd/hub
seleniumGridEnabled=true

# ===== Database Configuration =====
db.url=jdbc:mysql://staging-db-server:3306/parabank_staging
db.username=staging_tester
db.password=staging_db_pass

# ===== API Configuration =====
api.baseUrl=https://staging.parabank.parasoft.com/parabank/services/bank
api.timeout=60

# ===== Security Configuration =====
encrypt.sensitive.data=true
secret.key=staging_secret_key_2024

# ===== Test Data Configuration =====
testdata.source=database
testdata.cache.enabled=true

# ===== Performance Configuration =====
performance.monitoring=true
slow.test.threshold=60

# ===== Notification Configuration =====
email.notifications=true
slack.notifications=true
teams.notifications=true

