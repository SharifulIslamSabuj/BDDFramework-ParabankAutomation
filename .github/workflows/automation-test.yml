# ============================================================
# ParaBank BDD Automation — GitHub Actions CI Pipeline
# ============================================================
# Triggers : push, pull_request, manual (workflow_dispatch)
# Runner   : ubuntu-latest
# Browser  : Google Chrome via Xvfb virtual display
# Build    : Gradle Wrapper (./gradlew)
#
# Job stages
#   1. Compile          — fail fast on compilation errors
#   2. Safety tests     — 12 focused framework tests; no browser
#   3. Full regression  — 18 Cucumber scenarios; exit code captured
#   4. Classify         — compares results to accepted baseline;
#                         exits 0 only for VALIDATED_BASELINE
# ============================================================

name: ParaBank BDD Automation Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target test environment'
        required: true
        default: 'qa'
        type: choice
        options:
          - qa
          - staging
          - uat
        # prod is intentionally absent — CI does not execute against production

permissions:
  contents: read

# Cancel in-progress runs on PRs and feature branches.
# Main branch runs are never cancelled — they are the authoritative record.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  selenium-bdd-tests:
    name: 'BDD Tests'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    # ── Resolve environment and credentials ──────────────────────────────
    # TEST_USERNAME / TEST_PASSWORD are read from GitHub repository Secrets.
    # When the secrets are not configured, ConfigManager falls back to the
    # values in qa.properties (the public ParaBank demo credentials 'sqa/sqa').
    env:
      TEST_ENV: ${{ inputs.environment || 'qa' }}
      TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
      TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

    steps:
      # ── 1. Source code ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 + Gradle dependency cache ─────────────────────────
      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # ── 3. Verify Gradle wrapper JAR integrity ────────────────────────
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      # ── 4. Google Chrome ─────────────────────────────────────────────
      #    ubuntu-latest ships with Chrome, but pinning 'stable' ensures
      #    a known-good version and prevents random runner-image surprises.
      - name: Set up Google Chrome (stable)
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Print Chrome version
        run: google-chrome --version

      # ── 5. Virtual display (Xvfb) ────────────────────────────────────
      #    The framework's qa.properties sets headless=false; modifying
      #    Java/config is out of scope.  Xvfb provides a 1920×1080 X11
      #    display so Chrome can open windows on a headless Linux runner.
      - name: Install Xvfb
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends xvfb

      # ── 6. Gradle wrapper permissions ────────────────────────────────
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      # ── 7. Compile gate ───────────────────────────────────────────────
      #    Surfaces compilation errors immediately without executing tests.
      #    Failure here stops the job before any browser or AUT contact.
      - name: Compile
        run: ./gradlew compileTestJava

      # ── 8. Production-safety gate ────────────────────────────────────
      #    12 focused tests — no browser, no network, no AUT contact.
      #    Verifies ConfigManager production detection and write guard.
      #    Must pass before any scenario execution begins.
      - name: Production-safety tests
        run: ./gradlew test --tests "*ProductionSafetyGuardTest"

      # ── 9. Full Cucumber regression ───────────────────────────────────
      #    The Gradle exit code is captured and written to step output.
      #    This step always exits 0 — the classify step (step 10) is the
      #    final gate that decides the overall job result.
      - name: Full regression — Selenium BDD tests (${{ env.TEST_ENV }})
        id: regression
        run: |
          set +e
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            ./gradlew clean test \
            -Denv=${{ env.TEST_ENV }} \
            -Dbrowser=chrome \
            -DmaxParallelForks=1 \
            -Ddataproviderthreadcount=1
          GRADLE_EXIT=$?
          echo "gradle_exit=$GRADLE_EXIT" >> "$GITHUB_OUTPUT"
          exit 0

      # ══════════════════════════════════════════════════════════════════
      # ARTIFACT COLLECTION — all run even when tests fail (if: always())
      # ══════════════════════════════════════════════════════════════════

      # ── 10a. Test logs (rolling Logback output) ───────────────────────
      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-logs-${{ env.TEST_ENV }}-run${{ github.run_number }}
          path: build/logs/
          retention-days: 14
          if-no-files-found: warn

      # ── 10b. Failure screenshots ──────────────────────────────────────
      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ env.TEST_ENV }}-run${{ github.run_number }}
          path: build/screenshots/
          retention-days: 14
          if-no-files-found: warn

      # ── 10c. ExtentReports HTML ───────────────────────────────────────
      - name: Upload Extent Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extent-report-${{ env.TEST_ENV }}-run${{ github.run_number }}
          path: build/reports/extent/
          retention-days: 14
          if-no-files-found: warn

      # ── 10d. Allure raw results (for Allure report generation) ────────
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ env.TEST_ENV }}-run${{ github.run_number }}
          path: allure-results/
          retention-days: 14
          if-no-files-found: warn

      # ── 10e. TestNG / Cucumber HTML reports ──────────────────────────
      - name: Upload TestNG reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: testng-reports-${{ env.TEST_ENV }}-run${{ github.run_number }}
          path: build/reports/tests/
          retention-days: 14
          if-no-files-found: warn

      # ── 11. Classify results and write job summary ────────────────────
      #    Parses build/test-results/test/TEST-*.xml against the accepted
      #    known-failure baseline.
      #
      #    VALIDATED_BASELINE     → exit 0  (job green)
      #    UNEXPECTED_REGRESSION  → exit 1  (job red)
      #    INFRASTRUCTURE_FAILURE → exit 2  (job red)
      #    RESULTS_UNAVAILABLE    → exit 3  (job red)
      #
      #    The job summary is written here regardless of outcome so that
      #    the Actions UI always shows classification details.
      - name: Classify results and write job summary
        if: always()
        env:
          GRADLE_EXIT_CODE: ${{ steps.regression.outputs.gradle_exit }}
          TEST_ENV_LABEL: ${{ env.TEST_ENV }}
        run: |
          chmod +x scripts/analyze-test-results.sh
          scripts/analyze-test-results.sh
